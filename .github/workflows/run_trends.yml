name: Run Google Trends Monthly

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

    - name: Set up R
      uses: r-lib/actions/setup-r@v2

    - name: Cache R packages
      uses: actions/cache@v3
      with:
        path: ${{ env.R_LIBS_USER }}
        key: ${{ runner.os }}-r-packages-${{ hashFiles('trends_script.R') }}
        restore-keys: |
          ${{ runner.os }}-r-packages-

    - name: Install R dependencies
      run: |
        R -e "install.packages(c('gtrendsR','readr','lubridate'), repos='https://cloud.r-project.org')"

    - name: Run Google Trends script
      run: |
        Rscript Google_Trends_Script_LFT.R

    - name: Commit generated CSV
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add data/*.csv
        git commit -m "Add new monthly CSV"
        git push
      continue-on-error: true
