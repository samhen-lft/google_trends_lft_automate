name: Run Google Trends Monthly

# Runs 3am UTC on the 1st of every month
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:  # allows manual run

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up R
      uses: r-lib/actions/setup-r@v2

    - name: Install R dependencies
      run: |
        R -e "install.packages(c('gtrendsR','readr','lubridate'), repos='https://cloud.r-project.org')"

    - name: Run Google Trends script
      run: |
        Rscript Google_Trends_Script_LFT.R

    - name: Commit generated CSV
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add data/*.csv
        git commit -m "Add new monthly CSV"
        git push
      continue-on-error: true
