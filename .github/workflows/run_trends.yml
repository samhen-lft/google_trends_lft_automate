name: Run Google Trends Monthly

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: |
          R -e "install.packages(c('gtrendsR','readr','lubridate'), repos='https://cloud.r-project.org')"

      - name: Run Google Trends script
        run: |
          Rscript Google_Trends_Script_LFT.R

      - name: Commit generated CSV
        uses: stefanzweifel/git-auto-commit-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # ✅ must be set for push
        with:
          commit_message: "Add new monthly CSV"
          branch: main
          file_pattern: "data/*.csv"
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
