name: Run Google Trends Monthly

# Run workflow on the 1st of every month at 3am UTC
on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:  # allows manual run from GitHub

jobs:
  run-r-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up R
      uses: r-lib/actions/setup-r@v2

    - name: Install R dependencies
      run: |
        R -e "install.packages(c('gtrendsR','readr','lubridate'), repos='https://cloud.r-project.org')"

    - name: Run Google Trends script
      run: |
        Rscript trends_script.R

    - name: Commit output CSV
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add *.csv
        git commit -m "Update Google Trends CSV"
        git push
      continue-on-error: true  # avoid failure if CSV didn't change
